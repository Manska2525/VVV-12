services:
  - type: web
    name: spark-tma
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm install --no-audit --no-fund && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NODE_VERSION
        value: "20.11.0"
